<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CandidAI — Google Search Log</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --purple: #667eea; --purple-dark: #764ba2;
            --bg: #0f0f1a; --surface: #1a1a2e; --surface2: #16213e;
            --border: #2a2a4a; --text: #e2e8f0; --text-dim: #94a3b8;
            --green: #4ade80; --red: #f87171; --yellow: #fbbf24; --blue: #60a5fa;
            --google-blue: #4285f4;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

        /* topbar */
        .topbar { background: linear-gradient(135deg, var(--purple) 0%, var(--purple-dark) 100%); padding: 13px 20px; display: flex; align-items: center; gap: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.4); flex-shrink: 0; }
        .topbar a { color: rgba(255,255,255,0.7); text-decoration: none; font-size: 13px; }
        .topbar a:hover { color: #fff; }
        .topbar .sep { color: rgba(255,255,255,0.35); }
        .topbar h1 { font-size: 17px; font-weight: 700; }
        #ts { font-size: 12px; color: rgba(255,255,255,0.6); margin-left: auto; }

        /* filter bar */
        .filterbar { display: flex; align-items: center; gap: 10px; padding: 10px 20px; background: var(--surface2); border-bottom: 1px solid var(--border); flex-wrap: wrap; flex-shrink: 0; }
        select, input[type=number], input[type=datetime-local] {
            background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
            padding: 5px 10px; color: var(--text); font-size: 13px; outline: none;
        }
        select:focus, input:focus { border-color: var(--purple); }
        input[type=number] { width: 80px; }
        input[type=datetime-local] { width: 185px; color-scheme: dark; }
        .btn { background: var(--purple); color: #fff; border: none; border-radius: 6px; padding: 6px 14px; font-size: 13px; cursor: pointer; transition: background .2s; white-space: nowrap; }
        .btn:hover { background: var(--purple-dark); }
        .btn.ghost { background: var(--surface); border: 1px solid var(--border); color: var(--text-dim); }
        .btn.ghost:hover { color: var(--text); border-color: var(--purple); }
        .sep-v { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; }
        #counter { font-size: 12px; color: var(--text-dim); white-space: nowrap; }

        /* search filter */
        .searchbar { display: flex; align-items: center; gap: 10px; padding: 8px 20px; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
        .searchbar input[type=text] { flex: 1; max-width: 400px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 5px 10px; color: var(--text); font-size: 13px; }
        .searchbar input[type=text]:focus { outline: none; border-color: var(--purple); }

        /* content */
        #main { flex: 1; overflow-y: auto; padding: 20px; }

        /* stats */
        .stats { display: grid; grid-template-columns: repeat(auto-fit,minmax(160px,1fr)); gap: 12px; margin-bottom: 20px; }
        .stat { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; text-align: center; }
        .stat-v { font-size: 26px; font-weight: 700; color: var(--google-blue); }
        .stat-l { font-size: 11px; color: var(--text-dim); margin-top: 4px; }

        /* cards */
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 10px; overflow: hidden; }
        .card.error { border-color: rgba(248,113,113,0.4); }
        .card-hd { padding: 14px 18px; cursor: pointer; background: linear-gradient(to right,rgba(66,133,244,.1),rgba(102,126,234,.1)); display: flex; justify-content: space-between; align-items: center; user-select: none; }
        .card-hd:hover { background: linear-gradient(to right,rgba(66,133,244,.2),rgba(102,126,234,.2)); }
        .card.error .card-hd { background: linear-gradient(to right,rgba(248,113,113,.08),rgba(248,113,113,.05)); }
        .card-title { font-weight: 600; font-size: 14px; word-break: break-word; max-width: 600px; }
        .card-ts { font-size: 11px; color: var(--text-dim); margin-top: 3px; }
        .card-meta { display: flex; gap: 14px; font-size: 12px; color: var(--text-dim); align-items: center; flex-shrink: 0; margin-left: 12px; }
        .badge { background: rgba(66,133,244,.15); color: var(--google-blue); border-radius: 4px; padding: 2px 8px; font-size: 11px; font-weight: 600; }
        .badge.err { background: rgba(248,113,113,.15); color: var(--red); }
        .chevron { transition: transform .3s; font-size: 13px; }
        .chevron.open { transform: rotate(180deg); }
        .card-body { max-height: 0; overflow: hidden; transition: max-height .3s ease-out; }
        .card-body.open { max-height: 200000px; transition: max-height .5s ease-in; }

        /* result items */
        .result-item { border-bottom: 1px solid var(--border); padding: 14px 18px; display: flex; gap: 12px; align-items: flex-start; }
        .result-item:last-child { border-bottom: none; }
        .result-num { color: var(--text-dim); font-size: 12px; font-weight: 700; min-width: 22px; margin-top: 2px; }
        .result-body { flex: 1; min-width: 0; }
        .result-title { font-size: 14px; font-weight: 600; color: var(--google-blue); text-decoration: none; display: block; margin-bottom: 3px; word-break: break-word; }
        .result-title:hover { text-decoration: underline; }
        .result-url { font-size: 11px; color: var(--green); margin-bottom: 5px; word-break: break-all; }
        .result-snippet { font-size: 12.5px; color: var(--text-dim); line-height: 1.55; }

        .error-box { padding: 14px 18px; color: var(--red); font-size: 13px; background: rgba(248,113,113,.07); }
        .no-results { padding: 14px 18px; color: var(--text-dim); font-size: 13px; font-style: italic; }

        .exclude-tag { font-size: 11px; color: var(--yellow); background: rgba(251,191,36,.1); border-radius: 4px; padding: 2px 7px; margin-left: 8px; }

        .empty { text-align:center; padding:60px; color:var(--text-dim); font-size:14px; }
        .err-banner { background:rgba(248,113,113,.1); border:1px solid rgba(248,113,113,.3); border-radius:6px; padding:10px 16px; color:var(--red); margin:12px 20px; font-size:13px; }

        ::-webkit-scrollbar{width:5px} ::-webkit-scrollbar-track{background:var(--bg)} ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px} ::-webkit-scrollbar-thumb:hover{background:var(--purple)}
    </style>
</head>
<body>

<div class="topbar">
    <a href="../">← Logs</a><span class="sep">/</span><h1>Google Search Log</h1>
    <span id="ts">—</span>
</div>

<!-- Filter bar -->
<div class="filterbar">
    <select id="mode" onchange="onModeChange()">
        <option value="entries">Ultime N ricerche</option>
        <option value="time">Ultime N …</option>
        <option value="range">Intervallo date</option>
    </select>

    <span id="g-n" style="display:flex;gap:8px;align-items:center">
        <input type="number" id="n" value="50" min="1" max="5000">
        <select id="unit" style="display:none">
            <option value="minutes">minuti</option>
            <option value="hours" selected>ore</option>
            <option value="days">giorni</option>
        </select>
    </span>

    <span id="g-range" style="display:none;gap:8px;align-items:center">
        <label style="font-size:12px;color:var(--text-dim)">Da</label>
        <input type="datetime-local" id="from">
        <label style="font-size:12px;color:var(--text-dim)">A</label>
        <input type="datetime-local" id="to">
    </span>

    <button class="btn" onclick="load()">Applica</button>
    <span class="sep-v"></span>
    <span id="counter">—</span>
</div>

<!-- Search filter -->
<div class="searchbar">
    <input type="text" id="search" placeholder="Filtra per query…" oninput="renderEntries(allEntries, totalEntries)">
    <button class="btn ghost" onclick="document.getElementById('search').value='';renderEntries(allEntries,totalEntries)">✕</button>
</div>

<div id="err-banner" class="err-banner" style="display:none"></div>
<div id="main">
    <div class="stats" id="stats" style="display:none"></div>
    <div id="cards"><div class="empty">Caricamento…</div></div>
</div>

<script>
let allEntries = [], totalEntries = 0;

// ── UI helpers ──────────────────────────────────────────────────
function onModeChange() {
    const m = document.getElementById('mode').value;
    document.getElementById('g-n').style.display     = m !== 'range' ? 'flex' : 'none';
    document.getElementById('unit').style.display    = m === 'time'  ? ''     : 'none';
    document.getElementById('g-range').style.display = m === 'range' ? 'flex' : 'none';
}

function toggleCard(idx) {
    document.getElementById('body-' + idx).classList.toggle('open');
    document.getElementById('chev-' + idx).classList.toggle('open');
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── Render ──────────────────────────────────────────────────────
function renderEntries(entries, total) {
    const q = document.getElementById('search').value.trim().toLowerCase();
    const filtered = q
        ? entries.filter(e => (e.query || '').toLowerCase().includes(q))
        : entries;

    document.getElementById('counter').textContent = filtered.length + ' / ' + total + ' ricerche';

    if (!filtered.length) {
        document.getElementById('stats').style.display = 'none';
        document.getElementById('cards').innerHTML = '<div class="empty">Nessuna ricerca trovata.</div>';
        return;
    }

    const totalResults = filtered.reduce((s, e) => s + (e.result_count || 0), 0);
    const errors       = filtered.filter(e => e.error).length;
    const avgResults   = filtered.length ? (totalResults / filtered.length).toFixed(1) : '0';

    const statsEl = document.getElementById('stats');
    statsEl.style.display = 'grid';
    statsEl.innerHTML =
        `<div class="stat"><div class="stat-v">${filtered.length}</div><div class="stat-l">Ricerche</div></div>` +
        `<div class="stat"><div class="stat-v">${totalResults}</div><div class="stat-l">Risultati Totali</div></div>` +
        `<div class="stat"><div class="stat-v">${avgResults}</div><div class="stat-l">Media Risultati</div></div>` +
        (errors ? `<div class="stat"><div class="stat-v" style="color:var(--red)">${errors}</div><div class="stat-l">Errori</div></div>` : '');

    const reversed = [...filtered].reverse();
    document.getElementById('cards').innerHTML = reversed.map((e, idx) => {
        const num    = filtered.length - idx;
        const tsStr  = e.timestamp ? new Date(e.timestamp).toLocaleString('it-IT') : '';
        const hasErr = !!e.error;
        const results = e.results || [];

        const resultsHtml = hasErr
            ? `<div class="error-box">❌ Errore: ${esc(e.error)}</div>`
            : results.length === 0
                ? `<div class="no-results">Nessun risultato restituito.</div>`
                : results.map((r, i) =>
                    `<div class="result-item">
                        <div class="result-num">#${i+1}</div>
                        <div class="result-body">
                            <a class="result-title" href="${esc(r.link)}" target="_blank" rel="noopener">${esc(r.title || r.link)}</a>
                            <div class="result-url">${esc(r.link)}</div>
                            <div class="result-snippet">${esc(r.snippet || '—')}</div>
                        </div>
                    </div>`
                ).join('');

        const excludeTag = e.exclude_url
            ? `<span class="exclude-tag">exclude: ${esc(e.exclude_url)}</span>` : '';

        return `<div class="card${hasErr ? ' error' : ''}">
            <div class="card-hd" onclick="toggleCard(${idx})">
                <div style="min-width:0;flex:1">
                    <div class="card-title">#${num} — ${esc(e.query || '')}${excludeTag}</div>
                    ${tsStr ? `<div class="card-ts">${tsStr}</div>` : ''}
                </div>
                <div class="card-meta">
                    <span class="badge${hasErr ? ' err' : ''}">${hasErr ? '❌ Error' : (e.result_count || 0) + ' results'}</span>
                    <span class="chevron" id="chev-${idx}">▼</span>
                </div>
            </div>
            <div class="card-body" id="body-${idx}">${resultsHtml}</div>
        </div>`;
    }).join('');
}

// ── Load ────────────────────────────────────────────────────────
async function load() {
    const mode = document.getElementById('mode').value;
    const n    = document.getElementById('n').value;
    const unit = document.getElementById('unit').value;
    const from = document.getElementById('from').value;
    const to   = document.getElementById('to').value;

    const params = new URLSearchParams({mode, n, unit});
    if (from) params.set('from', from.replace('T',' '));
    if (to)   params.set('to',   to.replace('T',' '));

    try {
        const r = await fetch('log.php?' + params + '&_=' + Date.now());
        if (!r.ok) throw new Error('HTTP ' + r.status);
        const data = await r.json();
        document.getElementById('err-banner').style.display = 'none';
        document.getElementById('ts').textContent = new Date().toLocaleTimeString('it-IT');
        allEntries    = data.entries || [];
        totalEntries  = data.total  || 0;
        renderEntries(allEntries, totalEntries);
    } catch(e) {
        const el = document.getElementById('err-banner');
        el.style.display = 'block';
        el.textContent = 'Errore caricamento log: ' + e.message;
        document.getElementById('cards').innerHTML = '<div class="empty">Nessun dato.</div>';
    }
}

// ── Boot ────────────────────────────────────────────────────────
onModeChange();
load();
</script>
</body>
</html>
