<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CandidAI — AI Interactions</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --purple: #667eea; --purple-dark: #764ba2;
            --bg: #0f0f1a; --surface: #1a1a2e; --surface2: #16213e;
            --border: #2a2a4a; --text: #e2e8f0; --text-dim: #94a3b8;
            --green: #4ade80; --red: #f87171; --yellow: #fbbf24;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

        /* topbar */
        .topbar { background: linear-gradient(135deg, var(--purple) 0%, var(--purple-dark) 100%); padding: 13px 20px; display: flex; align-items: center; gap: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.4); flex-shrink: 0; }
        .topbar a { color: rgba(255,255,255,0.7); text-decoration: none; font-size: 13px; }
        .topbar a:hover { color: #fff; }
        .topbar .sep { color: rgba(255,255,255,0.35); }
        .topbar h1 { font-size: 17px; font-weight: 700; }
        #ts { font-size: 12px; color: rgba(255,255,255,0.6); margin-left: auto; }

        /* filter bar */
        .filterbar { display: flex; align-items: center; gap: 10px; padding: 10px 20px; background: var(--surface2); border-bottom: 1px solid var(--border); flex-wrap: wrap; flex-shrink: 0; }
        select, input[type=number], input[type=datetime-local] {
            background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
            padding: 5px 10px; color: var(--text); font-size: 13px; outline: none;
        }
        select:focus, input:focus { border-color: var(--purple); }
        input[type=number] { width: 80px; }
        input[type=datetime-local] { width: 185px; color-scheme: dark; }
        .btn { background: var(--purple); color: #fff; border: none; border-radius: 6px; padding: 6px 14px; font-size: 13px; cursor: pointer; transition: background .2s; white-space: nowrap; }
        .btn:hover { background: var(--purple-dark); }
        .btn.ghost { background: var(--surface); border: 1px solid var(--border); color: var(--text-dim); }
        .btn.ghost:hover { color: var(--text); border-color: var(--purple); }
        .sep-v { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; }
        #counter { font-size: 12px; color: var(--text-dim); white-space: nowrap; }

        /* content */
        #main { flex: 1; overflow-y: auto; padding: 20px; }

        /* stats */
        .stats { display: grid; grid-template-columns: repeat(auto-fit,minmax(160px,1fr)); gap: 12px; margin-bottom: 20px; }
        .stat { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; text-align: center; }
        .stat-v { font-size: 26px; font-weight: 700; color: var(--purple); }
        .stat-l { font-size: 11px; color: var(--text-dim); margin-top: 4px; }

        /* execution cards */
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 10px; overflow: hidden; }
        .card-hd { padding: 14px 18px; cursor: pointer; background: linear-gradient(to right,rgba(102,126,234,.12),rgba(118,75,162,.12)); display: flex; justify-content: space-between; align-items: center; user-select: none; }
        .card-hd:hover { background: linear-gradient(to right,rgba(102,126,234,.22),rgba(118,75,162,.22)); }
        .card-title { font-weight: 600; font-size: 14px; }
        .card-ts { font-size: 11px; color: var(--text-dim); margin-top: 3px; }
        .card-meta { display: flex; gap: 14px; font-size: 12px; color: var(--text-dim); align-items: center; }
        .chevron { transition: transform .3s; font-size: 13px; }
        .chevron.open { transform: rotate(180deg); }
        .card-body { max-height: 0; overflow: hidden; transition: max-height .3s ease-out; }
        .card-body.open { max-height: 200000px; transition: max-height .5s ease-in; }

        .io-pair { border-bottom: 1px solid var(--border); padding: 16px 18px; }
        .io-pair:last-child { border-bottom: none; }
        .io-lbl { font-weight: 600; color: var(--purple); margin-bottom: 8px; font-size: 11px; text-transform: uppercase; letter-spacing: .5px; }
        .io-box { background: var(--bg); padding: 12px 14px; border-radius: 7px; border-left: 3px solid var(--purple); line-height: 1.65; color: var(--text); font-size: 13.5px; }
        .io-box.out { border-left-color: var(--purple-dark); }
        .io-box h1,.io-box h2,.io-box h3 { margin:10px 0 6px; }
        .io-box h1{font-size:18px} .io-box h2{font-size:16px} .io-box h3{font-size:14px}
        .io-box p { margin-bottom:7px; }
        .io-box code { background:rgba(102,126,234,.2); padding:1px 5px; border-radius:3px; font-size:12px; }
        .io-box pre { background:#0d0d1a; padding:11px; border-radius:6px; overflow-x:auto; margin:7px 0; }
        .io-box pre code { background:none; padding:0; }
        .io-box ul,.io-box ol { margin-left:16px; margin-bottom:7px; }
        .io-box li { margin-bottom:3px; }

        .empty { text-align:center; padding:60px; color:var(--text-dim); font-size:14px; }
        .err { background:rgba(248,113,113,.1); border:1px solid rgba(248,113,113,.3); border-radius:6px; padding:10px 16px; color:var(--red); margin:12px 20px; font-size:13px; }

        ::-webkit-scrollbar{width:5px} ::-webkit-scrollbar-track{background:var(--bg)} ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px} ::-webkit-scrollbar-thumb:hover{background:var(--purple)}
    </style>
</head>
<body>

<div class="topbar">
    <a href="../">← Logs</a><span class="sep">/</span><h1>AI Interactions</h1>
    <span id="ts">—</span>
</div>

<!-- Filter bar -->
<div class="filterbar">
    <select id="mode" onchange="onModeChange()">
        <option value="entries">Ultime N sessioni</option>
        <option value="time">Ultime N …</option>
        <option value="range">Intervallo date</option>
    </select>

    <span id="g-n" style="display:flex;gap:8px;align-items:center">
        <input type="number" id="n" value="20" min="1" max="1000">
        <select id="unit" style="display:none">
            <option value="minutes">minuti</option>
            <option value="hours" selected>ore</option>
            <option value="days">giorni</option>
        </select>
    </span>

    <span id="g-range" style="display:none;gap:8px;align-items:center">
        <label style="font-size:12px;color:var(--text-dim)">Da</label>
        <input type="datetime-local" id="from">
        <label style="font-size:12px;color:var(--text-dim)">A</label>
        <input type="datetime-local" id="to">
    </span>

    <button class="btn" onclick="load()">Applica</button>
    <span class="sep-v"></span>
    <span id="counter">—</span>
</div>

<div id="err" class="err" style="display:none"></div>
<div id="main">
    <div class="stats" id="stats" style="display:none"></div>
    <div id="cards"><div class="empty">Caricamento…</div></div>
</div>

<script>
// ── UI helpers ──────────────────────────────────────────────────
function onModeChange() {
    const m = document.getElementById('mode').value;
    document.getElementById('g-n').style.display     = m !== 'range' ? 'flex' : 'none';
    document.getElementById('unit').style.display    = m === 'time'  ? ''     : 'none';
    document.getElementById('g-range').style.display = m === 'range' ? 'flex' : 'none';
}

function toggleCard(idx) {
    document.getElementById('body-' + idx).classList.toggle('open');
    document.getElementById('chev-' + idx).classList.toggle('open');
}

// ── Render ──────────────────────────────────────────────────────
function renderEntries(entries, total) {
    if (!entries.length) {
        document.getElementById('cards').innerHTML = '<div class="empty">Nessuna sessione trovata.</div>';
        document.getElementById('stats').style.display = 'none';
        document.getElementById('counter').textContent = '0 sessioni';
        return;
    }

    document.getElementById('counter').textContent = entries.length + ' / ' + total + ' sessioni';

    const tok  = entries.reduce((s,e) => s + (e['total-tokens'] || 0), 0);
    const cost = entries.reduce((s,e) => s + (e.cost || 0), 0);
    const statsEl = document.getElementById('stats');
    statsEl.style.display = 'grid';
    statsEl.innerHTML =
        `<div class="stat"><div class="stat-v">${entries.length}</div><div class="stat-l">Sessioni</div></div>` +
        `<div class="stat"><div class="stat-v">${tok.toLocaleString('it-IT')}</div><div class="stat-l">Token Totali</div></div>` +
        `<div class="stat"><div class="stat-v">$${cost.toFixed(4)}</div><div class="stat-l">Costo Stimato</div></div>`;

    const reversed = [...entries].reverse();
    document.getElementById('cards').innerHTML = reversed.map((e, idx) => {
        const num    = entries.length - idx;
        const inputs = e.input  || [];
        const outs   = e.output || [];
        const pairs  = Math.max(inputs.length, outs.length);
        const tsStr  = e.timestamp ? new Date(e.timestamp).toLocaleString('it-IT') : '';

        const pairsHtml = Array.from({length: pairs}, (_, i) => {
            const inp = inputs[i] || '';
            const out = outs[i]   || '';
            return `<div class="io-pair">` +
                (inp ? `<div><div class="io-lbl">📥 Input ${i+1}</div><div class="io-box">${marked.parse(inp)}</div></div>` : '') +
                (out ? `<div style="margin-top:${inp?'12px':'0'}"><div class="io-lbl">📤 Output ${i+1}</div><div class="io-box out">${marked.parse(out)}</div></div>` : '') +
                `</div>`;
        }).join('');

        return `<div class="card">
            <div class="card-hd" onclick="toggleCard(${idx})">
                <div>
                    <div class="card-title">Sessione #${num}</div>
                    ${tsStr ? `<div class="card-ts">${tsStr}</div>` : ''}
                </div>
                <div class="card-meta">
                    <span>🎯 ${(e['total-tokens']||0).toLocaleString('it-IT')} token</span>
                    <span>💰 $${(e.cost||0).toFixed(4)}</span>
                    <span class="chevron" id="chev-${idx}">▼</span>
                </div>
            </div>
            <div class="card-body" id="body-${idx}">${pairsHtml}</div>
        </div>`;
    }).join('');
}

// ── Load ────────────────────────────────────────────────────────
async function load() {
    const mode = document.getElementById('mode').value;
    const n    = document.getElementById('n').value;
    const unit = document.getElementById('unit').value;
    const from = document.getElementById('from').value;
    const to   = document.getElementById('to').value;

    const params = new URLSearchParams({mode, n, unit});
    if (from) params.set('from', from.replace('T',' '));
    if (to)   params.set('to',   to.replace('T',' '));

    try {
        const r = await fetch('log.php?' + params + '&_=' + Date.now());
        if (!r.ok) throw new Error('HTTP ' + r.status);
        const data = await r.json();
        document.getElementById('err').style.display = 'none';
        document.getElementById('ts').textContent = new Date().toLocaleTimeString('it-IT');
        renderEntries(data.entries || [], data.total || 0);
    } catch(e) {
        const el = document.getElementById('err');
        el.style.display = 'block';
        el.textContent = 'Errore caricamento AI log: ' + e.message;
        document.getElementById('cards').innerHTML = '<div class="empty">Nessun dato.</div>';
    }
}

// ── Boot ────────────────────────────────────────────────────────
onModeChange();
load();
</script>
</body>
</html>
