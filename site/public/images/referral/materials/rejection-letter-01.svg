<svg xmlns="http://www.w3.org/2000/svg" width="210mm" height="297mm" viewBox="0 0 2100 2970"><rect width="2100" height="2970" fill="#FFFFFF"/><text x="260" y="300" font-family="Georgia, 'Times New Roman', serif" font-size="76" fill="#000000" font-weight="bold" text-anchor="start" letter-spacing="2" style="">TALENTCORP GLOBAL</text><text x="260" y="370" font-family="Georgia, 'Times New Roman', serif" font-size="44" fill="#6B7280" font-weight="normal" text-anchor="start" letter-spacing="0" style="font-style:italic">Human Resources Department</text><line x1="260" y1="430" x2="1840" y2="430" stroke="#6B7280" stroke-width="3"/><text x="260" y="560" font-family="Georgia, 'Times New Roman', serif" font-size="54" fill="#000000" font-weight="normal" text-anchor="start" letter-spacing="0" style="">Dear Candidate,</text><text x="260" y="680" font-family="Georgia, 'Times New Roman', serif" font-size="54" fill="#000000" font-weight="normal" text-anchor="start" letter-spacing="0" style="">Thank you for your interest in the position and for the time you invested</text><text x="260" y="766" font-family="Georgia, 'Times New Roman', serif" font-size="54" fill="#000000" font-weight="normal" text-anchor="start" letter-spacing="0" style="">in your application.</text><text x="260" y="938" font-family="Georgia, 'Times New Roman', serif" font-size="54" fill="#000000" font-weight="normal" text-anchor="start" letter-spacing="0" style="">After careful consideration, we regret to inform you that we have decided</text><text x="260" y="1024" font-family="Georgia, 'Times New Roman', serif" font-size="54" fill="#000000" font-weight="normal" text-anchor="start" letter-spacing="0" style="">to move forward with other candidates whose profiles more closely match</text><text x="260" y="1110" font-family="Georgia, 'Times New Roman', serif" font-size="54" fill="#000000" font-weight="normal" text-anchor="start" letter-spacing="0" style="">our current needs.</text><text x="260" y="1282" font-family="Georgia, 'Times New Roman', serif" font-size="54" fill="#000000" font-weight="normal" text-anchor="start" letter-spacing="0" style="">Please note that due to the high volume of applications received, we are</text><text x="260" y="1368" font-family="Georgia, 'Times New Roman', serif" font-size="54" fill="#000000" font-weight="normal" text-anchor="start" letter-spacing="0" style="">unable to provide individual feedback.</text><text x="260" y="1540" font-family="Georgia, 'Times New Roman', serif" font-size="54" fill="#000000" font-weight="normal" text-anchor="start" letter-spacing="0" style="">We encourage you to apply again in the future and wish you every success</text><text x="260" y="1626" font-family="Georgia, 'Times New Roman', serif" font-size="54" fill="#000000" font-weight="normal" text-anchor="start" letter-spacing="0" style="">in your job search.</text><text x="260" y="1772" font-family="Georgia, 'Times New Roman', serif" font-size="54" fill="#000000" font-weight="normal" text-anchor="start" letter-spacing="0" style="">Kind regards,</text><text x="260" y="1912" font-family="Georgia, 'Times New Roman', serif" font-size="54" fill="#000000" font-weight="normal" text-anchor="start" letter-spacing="0" style="font-style:italic">Talent Acquisition Team</text><text x="260" y="2770" font-family="Georgia, 'Times New Roman', serif" font-size="36" fill="#6B7280" font-weight="normal" text-anchor="start" letter-spacing="0" style="">TALENTCORP GLOBAL — This is an automated message. Replies to this address are not monitored.</text></svg>