<svg xmlns="http://www.w3.org/2000/svg" width="210mm" height="297mm" viewBox="0 0 2100 2970"><rect width="2100" height="2970" fill="#FFFFFF"/><text x="260" y="300" font-family="Georgia, 'Times New Roman', serif" font-size="76" fill="#000000" font-weight="bold" text-anchor="start" letter-spacing="2" style="">MERIDIAN CONSULTING GROUP</text><text x="260" y="370" font-family="Georgia, 'Times New Roman', serif" font-size="44" fill="#6B7280" font-weight="normal" text-anchor="start" letter-spacing="0" style="font-style:italic">Human Resources Department</text><line x1="260" y1="430" x2="1840" y2="430" stroke="#6B7280" stroke-width="3"/><text x="260" y="560" font-family="Georgia, 'Times New Roman', serif" font-size="54" fill="#000000" font-weight="normal" text-anchor="start" letter-spacing="0" style="">Dear Candidate,</text><text x="260" y="680" font-family="Georgia, 'Times New Roman', serif" font-size="54" fill="#000000" font-weight="normal" text-anchor="start" letter-spacing="0" style="">We appreciate the opportunity to review your application for the Analyst</text><text x="260" y="766" font-family="Georgia, 'Times New Roman', serif" font-size="54" fill="#000000" font-weight="normal" text-anchor="start" letter-spacing="0" style="">position within our organization.</text><text x="260" y="938" font-family="Georgia, 'Times New Roman', serif" font-size="54" fill="#000000" font-weight="normal" text-anchor="start" letter-spacing="0" style="">Following a thorough evaluation process, we will not be progressing your</text><text x="260" y="1024" font-family="Georgia, 'Times New Roman', serif" font-size="54" fill="#000000" font-weight="normal" text-anchor="start" letter-spacing="0" style="">candidacy at this time. This decision reflects the exceptionally competitive</text><text x="260" y="1110" font-family="Georgia, 'Times New Roman', serif" font-size="54" fill="#000000" font-weight="normal" text-anchor="start" letter-spacing="0" style="">nature of this year&#x27;s applicant pool of over 2,000 candidates.</text><text x="260" y="1282" font-family="Georgia, 'Times New Roman', serif" font-size="54" fill="#000000" font-weight="normal" text-anchor="start" letter-spacing="0" style="">Your details will be kept on file for a period of twelve months, in</text><text x="260" y="1368" font-family="Georgia, 'Times New Roman', serif" font-size="54" fill="#000000" font-weight="normal" text-anchor="start" letter-spacing="0" style="">accordance with our data retention policy.</text><text x="260" y="1540" font-family="Georgia, 'Times New Roman', serif" font-size="54" fill="#000000" font-weight="normal" text-anchor="start" letter-spacing="0" style="">We wish you the very best in your future endeavours.</text><text x="260" y="1686" font-family="Georgia, 'Times New Roman', serif" font-size="54" fill="#000000" font-weight="normal" text-anchor="start" letter-spacing="0" style="">Kind regards,</text><text x="260" y="1826" font-family="Georgia, 'Times New Roman', serif" font-size="54" fill="#000000" font-weight="normal" text-anchor="start" letter-spacing="0" style="font-style:italic">Talent Acquisition Team</text><text x="260" y="2770" font-family="Georgia, 'Times New Roman', serif" font-size="36" fill="#6B7280" font-weight="normal" text-anchor="start" letter-spacing="0" style="">MERIDIAN CONSULTING GROUP — This is an automated message. Replies to this address are not monitored.</text></svg>